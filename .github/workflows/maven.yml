name: Maven CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run TestCase1 (write file)
        run: mvn -Dtest=sample1.TestCase1 test

      - name: Run TestCase2 (read file)
        run: mvn -Dtest=sample1.TestCase2 test